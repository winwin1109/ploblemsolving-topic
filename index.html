<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作問題匯報與簡報製作</title>
    <style>
        :root {
            --primary: #4A00E0; /* 鮮艷深紫 */
            --secondary: #f0f4f8;
            --accent: #FF512F; /* 活力亮橘紅 */
            --highlight: #00C9FF; /* 明亮青色 */
            --text-dark: #2c3e50;
            --ppt-theme: #2c3e50; /* 預設簡報主色 */
        }
        body { 
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
            background: linear-gradient(135deg, #f6f8fd 0%, #f1f5f9 100%); 
            color: var(--text-dark); 
            margin: 0; 
            padding: 20px; 
            line-height: 1.6; 
        }
        .container { 
            max-width: 1500px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }
        
        /* 鮮豔的標題設計 */
        h1 { 
            text-align: center; 
            font-size: 36px; 
            margin-bottom: 25px; 
            display: inline-block; 
            position: relative; 
            left: 50%; 
            transform: translateX(-50%);
            background: linear-gradient(to right, #4A00E0, #8E2DE2, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 4px dashed var(--highlight);
            padding-bottom: 15px;
        }
        
        /* 視圖切換 */
        .view-section { display: none; animation: fadeIn 0.4s ease-out; }
        .active-view { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* 教學示範區塊 */
        .demo-box { 
            background: linear-gradient(135deg, #fff9eb 0%, #fff1f3 100%); 
            border: 3px dashed #FF512F; 
            border-radius: 16px; 
            padding: 30px; 
            margin-bottom: 40px; 
            cursor: pointer; 
            text-align: center; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
            box-shadow: 0 8px 20px rgba(255,81,47,0.15); 
        }
        .demo-box:hover { 
            transform: translateY(-5px) scale(1.02); 
            background: linear-gradient(135deg, #fff1f3 0%, #ffe3e8 100%); 
            box-shadow: 0 12px 25px rgba(255,81,47,0.25);
        }

        /* 行業選擇導航 */
        .industry-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin: 20px 0 30px 0; }
        .industry-item { 
            cursor: pointer; 
            border: 2px solid #e0e6ed; 
            border-radius: 16px; 
            text-align: center; 
            padding: 25px 15px; 
            background: #fff; 
            transition: all 0.3s ease; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
        }
        .industry-item:hover { 
            border-color: var(--highlight); 
            transform: translateY(-8px); 
            box-shadow: 0 15px 30px rgba(0,201,255,0.2); 
            background: linear-gradient(to bottom, #ffffff, #f0fbff);
        }
        .industry-item h3 { margin: 15px 0 0; color: var(--primary); font-size: 19px; font-weight: 700; line-height: 1.4; }
        
        /* 自由創作特製樣式 */
        .special-item {
            grid-column: 1 / -1; 
            background: linear-gradient(135deg, #fffbf0 0%, #fff2d9 100%);
            border: 3px dashed #f39c12;
            padding: 30px !important;
        }
        .special-item:hover {
            border-style: solid;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(243, 156, 18, 0.3) !important;
            border-color: #d35400;
            background: linear-gradient(135deg, #fff2d9 0%, #ffeaa7 100%);
        }

        /* 步驟與內容區 */
        .step-container { margin-bottom: 25px; border: 1px solid #e0e6ed; border-radius: 12px; overflow: hidden; background: #fff; text-align: left; }
        .step-header { background: linear-gradient(to right, var(--primary), #8E2DE2); color: white; padding: 15px 25px; font-size: 18px; font-weight: bold; }
        .tab-buttons { display: flex; background: #f8fafd; border-bottom: 1px solid #e0e6ed; }
        .tab-btn { flex: 1; padding: 14px; border: none; background: none; font-weight: bold; color: #555; cursor: pointer; border-right: 1px solid #e0e6ed; transition: 0.2s; font-size: 15px; }
        .tab-btn.active { background: white; color: var(--highlight); border-bottom: 3px solid var(--highlight); }
        .tab-content { padding: 25px; background: white; min-height: 120px; font-size: 16px; line-height: 1.7; }
        
        /* ================= 實作區佈局：雙視窗獨立滾動 ================= */
        .workspace { 
            display: flex; 
            gap: 25px; 
            align-items: stretch; 
            height: 82vh; 
            margin-top: 20px; 
            background: #fdfdfe;
            border-radius: 16px;
            border: 1px solid #e0e6ed;
            overflow: hidden;
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.03);
        }
        
        .editor-panel { flex: 1.1; overflow-y: auto; padding: 25px; background: #fcfdfe; }
        .preview-panel { flex: 1; overflow-y: auto; padding: 25px; background: #f8fafd; border-left: 2px dashed #e0e6ed; display: flex; flex-direction: column; align-items: center; }

        .editor-panel::-webkit-scrollbar, .preview-panel::-webkit-scrollbar { width: 8px; }
        .editor-panel::-webkit-scrollbar-track, .preview-panel::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .editor-panel::-webkit-scrollbar-thumb, .preview-panel::-webkit-scrollbar-thumb { background: var(--highlight); border-radius: 4px; }

        /* 編輯器內容樣式 */
        .exercise-step { margin-bottom: 30px; background: white; padding: 25px; border-radius: 12px; border-left: 6px solid var(--highlight); box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        textarea { width: 100%; height: 130px; padding: 15px; border: 2px solid #dcdde1; border-radius: 8px; font-size: 15px; margin-top: 15px; font-family: inherit; line-height: 1.6; box-sizing: border-box; transition: border-color 0.3s; background: #fafbfc; resize: vertical; }
        textarea:focus { outline: none; border-color: var(--highlight); background: #fff; box-shadow: 0 0 0 4px rgba(0,201,255,0.15); }

        /* 常用句式區塊 */
        .phrase-box { background: linear-gradient(to right, #e0f7fa, #e8f8f5); border-left: 4px solid #1abc9c; padding: 15px; margin-top: 12px; margin-bottom: 12px; border-radius: 6px; font-size: 14px; color: #2c3e50; display: flex; justify-content: space-between; align-items: center; }
        .btn-tts-small { background: linear-gradient(135deg, #1abc9c, #16a085); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: bold; flex-shrink: 0; transition: 0.3s; box-shadow: 0 3px 8px rgba(26,188,156,0.3); }
        .btn-tts-small:hover { transform: translateY(-2px); box-shadow: 0 5px 12px rgba(26,188,156,0.4); }

        /* 圖片上傳區 */
        .upload-section { margin-top: 15px; background: #f4f6f7; padding: 12px 15px; border-radius: 8px; border: 1px dashed #bdc3c7; display: flex; justify-content: space-between; align-items: center; }
        .img-upload-label { background: linear-gradient(135deg, var(--primary), #34495e); color: white; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s; box-shadow: 0 3px 6px rgba(0,0,0,0.15); }
        .remove-img-btn { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; display: none; }

        /* 簡報預覽核心 (16:9 控制) */
        .slide-container { 
            width: 100%; 
            max-width: 650px; 
            margin: 0 auto;
            aspect-ratio: 16 / 9; 
            background: white; 
            position: relative; 
            padding: 4%; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            transition: all 0.4s ease; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
        }
        .slide-title { font-size: clamp(18px, 3.5vw, 30px); font-weight: bold; color: var(--ppt-theme); margin-bottom: 3%; padding-bottom: 2%; flex-shrink: 0; z-index: 2; position: relative; }
        .slide-body-wrapper { display: flex; flex: 1; gap: 20px; overflow: hidden; z-index: 2; position: relative; }
        .slide-content { font-size: clamp(14px, 2vw, 20px); line-height: 1.6; white-space: pre-wrap; flex: 1; overflow-y: auto; color: #333; }
        .slide-uploaded-img { max-width: 45%; max-height: 100%; object-fit: contain; border-radius: 8px; box-shadow: 0 6px 12px rgba(0,0,0,0.15); display: none; flex-shrink: 0; z-index: 2; position: relative; }

        /* 底部工具區 */
        .reference-area { width: 100%; margin-top: 25px; padding: 20px; background: #fff; border: 1px solid #f39c12; border-radius: 12px; box-sizing: border-box; box-shadow: 0 4px 15px rgba(243,156,18,0.08); }
        .btn-group { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; font-size: 15px; }
        .btn-primary { background: linear-gradient(135deg, var(--highlight), #00A8FF); color: white; box-shadow: 0 4px 12px rgba(38,208,206,0.3); }
        .btn-primary:hover { box-shadow: 0 6px 18px rgba(38,208,206,0.4); transform: translateY(-2px); }
        .btn-accent { background: linear-gradient(135deg, #FF512F, #DD2476); color: white; box-shadow: 0 4px 12px rgba(255,81,47,0.3); }
        .btn-lock { background: linear-gradient(135deg, #8E2DE2, #4A00E0); color: white; box-shadow: 0 4px 12px rgba(142,45,226,0.3);}
        .btn-ref-small { background: linear-gradient(135deg, #f1c40f, #f39c12); color: white; padding: 8px 15px; border-radius: 6px; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; margin-left: auto; }

        /* 圖片視覺藝廊 */
        .v-gallery-container { display: flex; overflow-x: auto; gap: 15px; padding: 15px 5px; scrollbar-width: thin; scrollbar-color: #f39c12 transparent; margin-top: 10px; background: transparent; border-radius: 8px;}
        .v-gallery-container::-webkit-scrollbar { height: 8px; }
        .v-gallery-container::-webkit-scrollbar-thumb { background: #f39c12; border-radius: 4px; }
        .v-gallery-container img { height: 160px; width: auto; border: 1px solid #ddd; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex-shrink: 0; cursor: zoom-in; transition: 0.3s;}
        .v-gallery-container img:hover { transform: scale(1.05); border-color: var(--highlight);}
        
        /* 模態框 (文字與圖片) */
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 40px; border-radius: 16px; width: 85%; max-width: 850px; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        #enlargedImg { max-width: 95%; max-height: 95vh; object-fit: contain; border-radius: 8px; animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 法規條文樣式 */
        .law-section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .law-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .law-section h3 { color: var(--primary); margin-top: 0; margin-bottom: 12px; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .law-section p { margin: 8px 0; font-size: 15.5px; line-height: 1.6; color: #444; }
        .law-title { font-weight: bold; text-decoration: none; border-bottom: 1px solid var(--highlight); padding-bottom: 2px; color: var(--highlight); transition: color 0.2s;}
        .law-title:hover { color: var(--accent) !important; border-bottom-color: var(--accent); background: rgba(38,208,206,0.1); }

        /* ================= 九大時尚風格主題 (根據 --ppt-theme 動態變色) ================= */
        
        /* 1. 商務專業 */
        .theme-office { background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); border-left: 12px solid var(--ppt-theme); }
        .theme-office .slide-title { color: var(--ppt-theme); border-bottom: 2px solid var(--ppt-theme); opacity: 0.9;}

        /* 2. 科技黑客 */
        .theme-tech { background: #1a1a2e; color: #ecf0f1; box-shadow: inset 0 0 0 2px var(--ppt-theme), 0 10px 25px rgba(0,0,0,0.3); }
        .theme-tech .slide-title { color: var(--ppt-theme); border-bottom: 1px dashed var(--ppt-theme); text-shadow: 0 0 8px var(--ppt-theme); }
        .theme-tech .slide-content { color: #dcdde1; }

        /* 3. 典雅餐飲 */
        .theme-catering { background: #fffcf5; border-top: 10px solid var(--ppt-theme); border-bottom: 3px solid var(--ppt-theme); }
        .theme-catering .slide-title { color: var(--ppt-theme); border-bottom: 2px dashed var(--ppt-theme); text-align: center; }
        
        /* 4. 創意視覺 (全新幾何/線條設計) */
        .theme-design { 
            background: #ffffff; 
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px),
                linear-gradient(0deg, rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            border: 1px solid #eaeaea; 
        }
        .theme-design::before { 
            content: ''; position: absolute; top: -20px; right: -20px; width: 100px; height: 100px; 
            border: 8px solid var(--ppt-theme); border-radius: 50%; opacity: 0.15; z-index: 0; pointer-events: none;
        }
        .theme-design::after { 
            content: ''; position: absolute; bottom: 20px; left: 20px; width: 60px; height: 60px; 
            background-color: var(--ppt-theme); opacity: 0.1; z-index: 0; pointer-events: none; 
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
        .theme-design .slide-title { 
            color: var(--ppt-theme); border-bottom: 3px solid var(--ppt-theme); 
            display: inline-block; padding-right: 40px; position: relative;
        }
        .theme-design .slide-title::after {
            content: ''; position: absolute; right: 10px; bottom: -7.5px; width: 12px; height: 12px;
            background-color: var(--ppt-theme); border-radius: 50%;
        }

        /* 5. 工業重裝 */
        .theme-construction { background: #fdfbf7; border-left: 15px solid var(--ppt-theme); border-bottom: 8px solid #2c3e50; }
        .theme-construction .slide-title { background: var(--ppt-theme); color: #fff; padding: 6px 20px; display: inline-block; border-radius: 4px; text-transform: uppercase; border: none; letter-spacing: 1px;}

        /* 6. 親和活潑 */
        .theme-edu { background: #fffaf0; border: 5px solid var(--ppt-theme); border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .theme-edu .slide-title { color: var(--ppt-theme); border-bottom: 3px dotted var(--ppt-theme); text-align: center; }

        /* 7. 留白簡約 */
        .theme-minimalist { background: #ffffff; border: 1px solid #eaeaea; border-left: 3px solid var(--ppt-theme); }
        .theme-minimalist .slide-title { color: var(--ppt-theme); border-bottom: 1px solid var(--ppt-theme); font-weight: 300; letter-spacing: 3px; }
        
        /* 8. 綠色自然 */
        .theme-nature { background: linear-gradient(to right bottom, #f4fbf4, #e8f5e9); border-radius: 20px 0 20px 0; border-left: 8px solid var(--ppt-theme); }
        .theme-nature .slide-title { color: var(--ppt-theme); border-bottom: 2px solid var(--ppt-theme); opacity: 0.8; }
        
        /* 9. 專業航空 */
        .theme-aviation { background: #ffffff; border-top: 15px solid var(--ppt-theme); background-image: linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px); background-size: 30px 30px; }
        .theme-aviation .slide-title { color: var(--ppt-theme); border-bottom: 4px solid var(--ppt-theme); text-transform: uppercase; letter-spacing: 1px; }

        /* 最終預覽區網格 */
        #final-gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px; 
            padding: 30px; 
            background: #f8fafd; 
            border-radius: 16px; 
        }

        /* RWD 手機版面優化 (上下分割) */
        @media (max-width: 992px) {
            .workspace { flex-direction: column; height: 88vh; gap: 0; }
            .editor-panel { flex: 1 1 50%; padding: 15px; border-radius: 12px 12px 0 0; border-bottom: 3px solid var(--highlight); }
            .preview-panel { flex: 1 1 50%; padding: 15px; border-radius: 0 0 12px 12px; border-left: none; }
            .slide-container { max-width: 100%; padding: 4%; }
            .slide-title { font-size: 16px !important; margin-bottom: 5px !important; }
            .slide-content { font-size: 13px !important; }
            h1 { font-size: 26px; }
            .industry-gallery { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="no-print" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <button class="btn-primary" onclick="switchView('home-view')">🏠 返回首頁</button>
        <div id="status-bar" style="font-weight: bold; color: var(--highlight);"></div>
    </div>

    <div id="home-view" class="view-section active-view">
        <h1>工作問題匯報與簡報製作</h1>
        
        <div class="demo-box" onclick="openDemo()">
            <h2 style="color: var(--accent); margin: 0; font-size: 30px; text-shadow: 1px 1px 2px rgba(0,0,0,0.05);">
                <span style="font-size: 1.5em; vertical-align: middle;">📢</span> 
                施工噪音問題匯報 (簡報匯報示範)
                <span style="font-size: 1.5em; vertical-align: middle;">🏗️</span>
            </h2>
            <p style="font-size: 16px; font-weight: bold; color: #555; margin-top: 15px;">👉 點擊查看 9 步拆解結構、完整講稿與視覺排版參考</p>
        </div>

        <h2 style="text-align: center; color: var(--primary); border-top: 1px dashed #ccc; padding-top: 35px; font-size: 22px;">選擇工作範疇進行實作練習</h2>
        <div class="industry-gallery" id="industry-list">
            </div>
    </div>

    <div id="demo-view" class="view-section">
        <h2 style="color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 15px;">📢 施工噪音問題匯報 (簡報匯報示範) 🏗️</h2>
        <p style="margin-bottom: 30px; color: #555; text-align: center; font-size: 16px;">請依次查看下方步驟，點擊「組織內容」可聆聽語音示範。</p>
        <div id="demo-steps-container"></div>
        
        <div style="background: linear-gradient(to right, #f4f8ff, #eef5ff); padding: 25px; border-radius: 12px; margin-top: 40px; border: 2px dashed #3498db;">
            <h3 style="color:#2980b9; font-size: 20px; margin-top: 0; text-align: center;">🖼️ 簡報視覺排版參考 (V1 - V14) <br><span style="font-size:14px;color:#777; font-weight:normal;">(左右滑動瀏覽，點擊圖片可全螢幕放大)</span></h3>
            <div id="demo-gallery" class="v-gallery-container"></div>
        </div>
    </div>

    <div id="exercise-view" class="view-section">
        <h2 id="exercise-title" style="text-align: center; color: var(--highlight); font-size: 28px;"></h2>
        
        <div class="workspace">
            
            <div class="editor-panel no-print">
                <div style="margin-bottom: 25px; border-bottom: 2px dashed #e0e6ed; padding-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.02);">
                    <label style="font-weight:bold; color:var(--primary); font-size:15px;">🎨 簡報主色：</label>
                    <input type="color" id="theme-color" value="#2c3e50" onchange="updateUI()" style="vertical-align: middle; cursor:pointer;">
                    <label style="margin-left: 20px; font-weight:bold; color:var(--primary); font-size:15px;">🖼️ 風格主題：</label>
                    <select id="theme-style" onchange="updateUI()" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; font-size: 14px; outline: none; cursor:pointer;">
                        <option value="theme-office">🏢 商務專業 (辦公室/通用)</option>
                        <option value="theme-tech">💻 科技黑客 (資訊科技)</option>
                        <option value="theme-catering">🍽️ 典雅餐飲 (酒店餐飲)</option>
                        <option value="theme-design">🎨 創意視覺 (設計創作)</option>
                        <option value="theme-construction">🚧 工業重裝 (工程地盤)</option>
                        <option value="theme-edu">🏫 親和活潑 (幼教康體)</option>
                        <option value="theme-minimalist">🤍 留白簡約 (簡約風)</option>
                        <option value="theme-nature">🌿 綠色自然 (自然風)</option>
                        <option value="theme-aviation">✈️ 專業航空 (航空風)</option>
                    </select>
                </div>
                
                <div id="steps-inputs"></div>

        demo: `問題匯報示例－地盤職安健違規問題匯報
林主任，近來我們在內部巡查時發現了一個潛在風險，指公司的工程隊伍在施工時可能違反了《工廠及工業經營條例》（第 59 章），下面我想向您匯報一下。

涉及違規的是即將完工的「海濱商場」中庭玻璃幕牆工程。本週一，安全主任在進行現場的最終巡查時，發現外牆棚架上有數名工人正在進行高空工作，但完全沒有配戴安全帶，現場亦沒有設置防墮網。收到內部通報後，我馬上進行調查，確認工程分判商確實沒有為工人嚴格執行安全防護裝備的規定。根據《工廠及工業經營條例》的規定，東主必須為僱員提供及維持安全的工作系統及設備。若未及時糾正而讓存有安全隱患的項目繼續施工，公司不但會面臨勞工處的檢控與停工令，更會嚴重威脅工人的生命安全，問題亟需解決。

據調查，引發這次職安健危機的原因主要有兩方面。首先，負責該項目的前線管工安全意識薄弱，為了趕進度而默許工人不佩戴安全裝備進行危險操作。其次，項目團隊忽視了高空工作的日常巡查，未有在施工初期及時落實安全設備的監控制度。為了解決目前的問題，我有以下三個建議。

第一，採取即時措施，暫停違規操作。建議在今天的整改限期前，馬上安排工程團隊立刻為該外牆棚架加裝合格的防墮網，並強制要求所有高空工作人員配戴全身式安全帶及獨立救生繩。這樣可確保所有施工環節皆具備合法安全標準，將高空墮下的風險在復工前徹底消除。

第二，完善內部巡查與記錄流程。我建議立即嚴格執行「高空工作安全設備紀錄表」。由即日起，所有工程項目在每日開工前，管工必須確實記錄所有安全帶、防墮網的檢查狀況及提供照片證明，並由項目經理或安全主任簽字核實。我們評估過這個做法的可行性，團隊在開工前只需多花幾分鐘填寫與核對，就能有效把關，將未來的違規風險降到最低。

第三，從長遠來看，儘快為公司統一採購配備物聯網（IoT）感測器的智能安全帶系統。這是解決高空工作安全問題最徹底、有效的方法。針對前線管工為了趕進度而默許工人違規的情況，智能安全帶能透過內建感測器，實時偵測工人是否有正確扣上安全扣及連接獨立救生繩。一旦工人在未扣妥安全帶的情況下進行高空作業，裝備不僅會立即發出警鳴提醒工人，系統更會自動越級發送違規通知至管理層及安全主任的手機應用程式。這種透明且即時的中央監控機制，能有效阻嚇工人貪圖方便的行為，並徹底杜絕管工隱瞞或包庇違規的可能，從根本彌補人為巡查的漏洞。此外，我們也應邀請註冊安全審核員為全體工程團隊舉辦職安健法規培訓，提升員工的合規意識。

總括而言，如果能及時補足防護裝備，嚴格執行安全記錄流程以及引入智能監控設備，相信我們的問題就可迎刃而解，並保障公司未來的營運安全。` 
    },

        demo: `問題匯報示例－教員註冊違規問題匯報 
陳校監，近來我們在內部巡查時發現了一個潛在風險，指校方的教學團隊在人事登記上可能違反了《教育條例》（第 279 章），下面我想向您匯報一下。

涉及違規的是本學期新入職的兩名幼兒班助理老師。本週一，行政主任在進行每週的人事檔案巡查時，發現這兩名員工雖然已遞交申請，但尚未正式獲教育局批核為「准許教員」，卻已經在班房內獨立帶班進行教學活動。收到內部通報後，我馬上進行調查，確認校方在安排課表時，確實忽略了核實其註冊證明的生效日期。根據《教育條例》的規定，任何人在學校任教而並非註冊教員或准許教員，即屬違法；校監及校長亦須承擔法律責任。若未及時糾正而讓無牌教員繼續教學活動，學校不但會面臨教育局的警告或檢控，更會嚴重損害家長對本校專業性的信任，問題亟需解決。

據調查，引發這次註冊危機的原因主要有兩方面。首先，負責招聘的人事職員法律意識薄弱，誤以為只要遞交了申請表格即可視作「具備資格」開始帶班。其次，教學管理團隊忽視了入職前的執業資格巡查，未有在編排課表前及時落實教員註冊證明的核查程序。為了解決目前的問題，我有以下三個建議。

第一，採取即時措施，調整工作安排。建議在明早的開課限期前，馬上安排該兩名員工暫時脫離教學前線，轉為處理不涉及教學的行政支援工作，其班務則由具備資格的註冊教員暫代。這樣可確保所有班房教學活動皆具備合法教員資格，將合規風險在復課前徹底消除。

第二，完善內部巡查與入職記錄流程。我建議立即嚴格執行「教員執業資格紀錄表」。由即日起，所有新入職教員在進入班房前，人事部必須確實記錄其註冊編號及上載證書副本，並由校長簽字核實。我們評估過這個做法的可行性，人事部門在入職審核時只需多花幾分鐘核對，就能有效把關，將未來的違規風險降到最低。

第三，從長遠來看，儘快為學校引入智能人事管理與門禁聯動系統。這是解決教員資格問題最徹底、有效的方法。針對員工為了趕進度及方便排班而違規的情況，智能系統能自動比對教育局的註冊資料庫與校內課表。一旦偵測到未具備合法資格的人員被編入教學時段，系統會立即發出警鳴提醒，並自動發送異常通知給校監及校長。這種自動化的監控機制，能從源頭消除排班人員「圖方便」的動機。同時，系統會自動在證照到期前三個月發出續期提醒，防止因疏忽導致的過期執業。此外，我們也應邀請教育局代表或法律顧問為全體行政團隊舉辦教育法規培訓，提升員工的合規意識。

總括而言，如果能及時調整違規工作安排，嚴格執行資格記錄流程以及引入智能人事監控系統，相信我們的問題就可迎刃而解，並保障學校未來的營運安全。` 
    },
    "酒店餐飲": { 
        icon: "🍽️", defaultTheme: "theme-catering",
        lawHTML: `
            <div class="law-section"><h3>1. 食品安全與環境衞生清潔</h3>
            <p><a href="https://www.elegislation.gov.hk/hk/cap132" target="_blank" class="law-title">《公眾衞生及市政條例》（第 132 章）及其附屬規例：</a><br>常見違規：廚房衞生條件惡劣（缺乏深層清潔引致蟲鼠蹤跡）；食材儲存溫度不當；出售不宜食用食物。未妥善清理廚餘或隔油池積聚污物。</p></div>
            <div class="law-section"><h3>2. 菜單描述與銷售手法</h3>
            <p><a href="https://www.elegislation.gov.hk/hk/cap362" target="_blank" class="law-title">《商品說明條例》（第 362 章）：</a><br>常見違規：菜單食材名稱或產地與實際不符（如普通牛肉標示為日本A5和牛）。誇大功效或收取隱藏附加費。</p></div>
            <div class="law-section"><h3>3. 職業安全與健康</h3>
            <p><a href="https://www.elegislation.gov.hk/hk/cap509" target="_blank" class="law-title">《職業安全及健康條例》（第 509 章）：</a><br>常見違規：廚房地面濕滑未清理及未提供防滑墊；搬運重物姿勢不當；爐具缺乏清潔與保養導致燙傷或火警。</p></div>
            <div class="law-section"><h3>4. 酒精飲品管制</h3>

        demo: `問題匯報示例－餐飲食物衞生違規問題匯報
李經理，近來我們在內部巡查時發現了一個潛在風險，指公司的中式餐飲團隊在處理食材時可能違反了《公眾衞生及市政條例》（第 132 章），下面我想向您匯報一下。

涉及違規的是即將推出的「春茗海鮮宴」首批預製食材。本週一，酒店衞生督導員在進行廚房最終巡查時，發現多款海鮮食材在室溫下解凍超過四小時。收到內部通報後，我馬上進行調查，確認廚房團隊确实沒有遵守安全的食物存放溫度標準。根據《公眾衞生及市政條例》的規定，出售或管有不宜供人食用的食物即屬違法。若未及時攔截而讓這批受污染的餐飲產品推出供應，公司不但會面臨食環署的檢控與封閉令，更會嚴重損害我們與食客的信任關係，問題亟需解決。

據調查，引發這次食安危機的原因主要有兩方面。首先，負責該項目的初級廚師衞生保護意識薄弱，為了趕進度而直接將急凍海鮮放置於室溫解凍。其次，廚房管理團隊忽視了日常的食材溫度核查，未有在備料初期及時落實食材溫度監控程序。為了解決目前的問題，我有以下三個建議。

第一，採取即時措施，銷毀違規食材。建議在今晚的試菜宴限期前，馬上安排廚房團隊立刻將所有受影響的海鮮及預製食品徹底銷毀，並緊急聯繫供應商調動符合安全標準的新鮮食材補上。這樣可確保所有出品皆具備合法衞生標準，將食物中毒風險在菜式推出供應前徹底消除。

第二，完善內部巡查與記錄流程。我建議立即嚴格執行「食材解凍及溫度監控紀錄表」。由即日起，所有餐飲項目在開始烹飪前，廚師必須確實記錄所有高危食材的解凍時間及儲存溫度，並由部門主管或主廚簽字核實。我們評估過這個做法的可行性，團隊在備料時只需多花幾分鐘填寫及核對，就能有效把關，將未來的違規風險降到最低。

第三，從長遠來看，儘快為公司統一採購具備自動溫度警報系統的大型商用快速解凍雪櫃。這是解決食安問題最徹底、有效的方法。針對員工為了趕進度而違規的情況，快速解凍雪櫃能利用精準的氣流與溫濕度控制，將原本需要一整晚的冷藏解凍時間大幅縮短。這樣一來，即使廚師在急需用料的情況下，也能在符合安全溫度的環境中快速完成解凍，從源頭消除他們「為了貪快而放置室溫」的動機。同時，設備內建的自動警報系統會實時監控內部溫度，一旦有人為設定錯誤、櫃門未關妥，或溫度意外超過攝氏 4 度的安全警戒線，系統會立即現場鳴響，並自動發送異常通知給部門主管。這種透明且即時的監控機制，能有效阻嚇並防止任何人為的溫度違規操作。此外，我們也應邀請食環署認可的衞生顧問為全體餐飲團隊舉辦食品安全法規培訓，提升員工的合規意識。

總括而言，如果能及時銷毀問題食材，嚴格執行衞生記錄流程以及引入快速解凍設備，相信我們的問題就可迎刃而解，並保障酒店未來的營運安全。` 
    },

        demo: `問題匯報示例－版權侵權問題匯報
大家好，陳總監，近來我們在內部巡查時發現了一個潛在風險，指公司的設計團隊在製作廣告時可能違反了《版權條例》（第 528 章），下面我想向您匯報一下。

涉及違規的是即將向公眾發佈的「星光百貨」夏季宣傳海報。本週一，資深美術指導在進行定稿前的最終巡查時，發現海報設計原稿中使用的一款特殊英文字體及兩張背景插圖，僅具備個人非商業用途授權。收到內部通報後，我馬上進行調查，確認設計團隊確實沒有購買這幾項素材的商業授權證明。根據《版權條例》的規定，未經版權擁有人特許而在營商過程中使用版權作品即屬違法。若未及時攔截而讓這份涉及侵權的設計不慎發佈，公司不但會面臨版權持有人的索償，更會嚴重損害我們與大客戶的合約關係及品牌聲譽，問題亟需解決。

據調查，引發這次版權危機的原因主要有兩方面。首先，負責該項目的初級設計師版權意識薄弱，為了趕進度而直接從網上下載並使用了標示為「免費」但實則禁止商用的素材。其次，項目團隊忽視了素材授權證明的日常核查，未有在設計初期及時釐清所有素材的授權範圍。為了解決目前的問題，我有以下三個建議。

第一，採取即時措施，替換違規素材。建議在發佈限期前，馬上安排設計團隊連夜將海報中的字體和插圖，替換為公司已購買授權或完全原創的素材，並重新輸出印刷檔及更新社交媒體發佈排程。這樣可確保所有對外發佈的內容皆具備合法商業授權，將侵權風險在不慎發佈前徹底消除。

第二，完善內部審批與授權管理流程。我建議立即嚴格執行「設計素材授權清單」制度。由即日起，所有設計項目在最終定稿前，設計師必須列明所有字體、圖片、音樂的來源，並將授權書副本上傳至項目資料夾，由美術指導簽字核實。我們評估過這個做法的可行性，團隊在整理檔案時只需多花幾分鐘歸檔，就能有效把關，將未來的違規風險降到最低。

第三，從長遠來看，儘快為公司統一採購具備企業版商業授權的大型正版圖庫及雲端字體管理系統。這是解決版權問題最徹底、有效的方法。針對設計師為了趕進度而違規的情況，雲端字體系統能讓員工直接從授權清單中選用已購買的字體，從源頭消除他們自行下載不明字體的動機。同時，系統會自動記錄每項素材的使用記錄與到期日，一旦有人嘗試導入未授權素材，系統會立即提醒主管。這種即時的資源管理機制，能有效防止任何人為的版權違規操作。此外，我們也應邀請法律顧問為全體創意團隊舉辦知識產權培訓，提升員工的合規意識。

總括而言，如果能及時替換侵權素材，嚴格執行授權記錄流程以及引入雲端字體管理系統，相信我們的問題就可迎刃而解，並保障公司未來的營運安全。` 
    },

        lawHTML: `

        demo: `問題匯報示例－私隱數據違規處理問題匯報 
李總監，近來我們在內部巡查時發現了一個潛在風險，指公司的開發團隊在進行系統測試時可能違反了《個人資料（私隱）條例》（第 486 章），下面我想向您匯報一下。

涉及違規的是即將上線的「會員積分應用程式」升級版。本週一，高級品質保證工程師（QA）在進行上線前的最終安全測試時，發現開發團隊直接使用了未經脫敏（Data Masking）處理的真實客戶資料庫（包含會員姓名、電話及部分信用卡號碼）於測試環境中。收到內部通報後，我馬上進行調查，確認開發團隊確實沒有對這批敏感數據進行加密或匿名化處理。根據《個人資料（私隱）條例》的規定，資料使用者必須採取切實可行的步驟保障個人資料不受未獲准許的查閱或處理。若未及時攔截而讓帶有數據漏洞的系統正式上線，公司不但會面臨私隱專員公署的調查與處罰，更會嚴重損害我們與百萬會員的信任關係，問題亟需解決。

據調查，引發這次私隱危機的原因主要有兩方面。首先，負責該項目的初級後端工程師私隱保護意識薄弱，為了趕進度及方便除錯（Debugging），而直接從正式伺服器匯出真實數據到測試環境。其次，項目團隊忽視了測試數據的管理規範，未有在開發初期及時落實數據脫敏程序。為了解決目前的問題，我有以下三個建議。

第一，採取即時措施，清除違規數據。建議在系統上線限期前，馬上安排資料庫管理員（DBA）立刻將測試環境中的真實客戶資料徹底刪除，並一併清空所有可能記錄了敏感資訊的系統日誌（Logs）與暫存檔，替換為系統生成的虛擬測試數據（Dummy Data）。這樣可確保所有測試環境皆不涉及真實個人資料，將私隱外洩風險在系統正式上線前徹底消除。

第二，完善內部審批與代碼審查（Code Review）流程。我建議立即在開發任務追蹤系統中，加入「測試數據來源確認」的必填關卡。由即日起，工程師在提交代碼前，必須在系統內勾選確認測試數據已脫敏，並由技術主管在審批代碼時一併核實。我們評估過這個做法的可行性，這完全融入了現有的敏捷開發流程，工程師只需多花幾秒鐘點擊確認，就能有效把關，將未來的違規風險降到最低。

第三，從長遠來看，儘快為公司引入自動化數據脫敏工具，並整合至持續整合與持續部署（CI/CD）的自動化流水線中。這是解決私隱數據濫用問題最徹底、有效的方法。針對工程師為了趕進度而違規的情況，自動化工具能在系統從正式資料庫複製數據到測試環境的過程中，自動且即時地將敏感欄位混淆或替換。這樣一來，工程師不僅能節省手動製造測試數據的時間，更能從源頭徹底切斷他們接觸真實數據的機會，消除「貪圖方便」的動機，並防止任何人為的私隱違規操作。此外，我們也應邀請資訊安全專家為全體技術團隊舉辦數據私隱法規培訓，提升員工的合規意識。

總括而言，如果能及時清除真實數據與日誌，將數據審批融入開發系統，以及引入自動化脫敏工具，相信我們的問題就可迎刃而解，並保障公司未來的營運安全。`

function init() {
    const list = document.getElementById('industry-list');
    
    // 渲染一般行業 (除了自由創作)
    Object.keys(industries).forEach(name => {
        if(name !== "自由創作") {
            list.innerHTML += `
                <div class="industry-item" onclick="startExercise('${name}')">
                    <div style="font-size: 45px; margin-bottom: 15px;">${industries[name].icon}</div>
                    <h3>${name}</h3>
                </div>
            `;
        }
    });
    
    // 將「自由創作」獨立附加在最後，橫跨全欄位
    list.innerHTML += `
        <div class="industry-item special-item" onclick="startExercise('自由創作')">
            <div style="font-size: 55px; margin-bottom: 15px;">✨</div>
            <h3>自由創作</h3>
            <p style="color: #d35400; font-size: 15px; margin-top: 10px; font-weight: bold;">不限行業，自訂主題自由發揮</p>
        </div>
    `;
    
    // 初始化 V1-V14 藝廊
    renderGallery('demo-gallery');
    renderGallery('exercise-gallery');
}

function renderGallery(containerId) {
    const container = document.getElementById(containerId);
    let html = '';
    for(let i=1; i<=14; i++) {
        html += `<img src="V${i}.jpg" class="zoomable" onclick="openImageModal(this.src)" title="點擊放大參考">`;
    }
    container.innerHTML = html;
}

function switchView(id) {
    document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
    document.getElementById(id).classList.add('active-view');
    window.speechSynthesis.cancel();
    window.scrollTo(0, 0);
}

/* === 示範區邏輯 === */
function openDemo() {
    const container = document.getElementById('demo-steps-container');
    container.innerHTML = ''; 

    demoStepsData.forEach((step, index) => {
        const stepHtml = `
            <div class="step-container">
                <div class="step-header">${step.title}</div>
                <div class="tab-buttons">
                    <button class="tab-btn active" onclick="switchTab(this, 'q', ${index})">🤔 思考問題</button>
                    <button class="tab-btn" onclick="switchTab(this, 'i', ${index})">💡 核心要點</button>
                    <button class="tab-btn" onclick="switchTab(this, 'c', ${index})">📝 組織內容 (示範講稿)</button>
                </div>
                <div class="tab-content" id="tab-content-${index}">
                    <div style="color: #c0392b; font-weight: bold; font-size: 18px;">${step.q}</div>
                </div>
            </div>
        `;
        container.innerHTML += stepHtml;
    });
    switchView('demo-view');
}

function switchTab(btn, type, index) {
    const buttons = btn.parentElement.querySelectorAll('.tab-btn');
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const contentDiv = document.getElementById(`tab-content-${index}`);
    if (type === 'q') {
        contentDiv.innerHTML = `<div style="color: #c0392b; font-weight: bold; font-size: 18px;">${demoStepsData[index].q}</div>`;
    } else if (type === 'i') {
        const ideas = demoStepsData[index].i.split('；').map(item => `<li>${item}</li>`).join('');
        contentDiv.innerHTML = `<ul style="font-size: 16px; line-height: 1.6; margin:0; padding-left:20px; color:#2980b9; font-weight:bold;">${ideas}</ul>`;
    } else if (type === 'c') {
        const textToSpeak = demoSpeechData[index];
        contentDiv.innerHTML = `
            <div style="color: #2c3e50; font-size: 17px; margin-bottom: 15px;">${textToSpeak}</div>
            <button class="btn-tts" onclick="speakMandarin('${textToSpeak}')">🔊 普通話發音</button>
        `;
    }
}

function openImageModal(src) {
    document.getElementById('enlargedImg').src = src;
    document.getElementById('image-modal-box').style.display = 'flex';
}
function closeImageModal() {
    document.getElementById('image-modal-box').style.display = 'none';
}

/* === 實作區邏輯 === */
function startExercise(name) {
    selectedIndustry = name;
    document.getElementById('exercise-title').innerText = `${industries[name].icon} ${name}：工作匯報實作`;
    
    // 設定預設風格
    document.getElementById('theme-style').value = industries[name].defaultTheme;

    // 載入本地數據
    const savedRaw = localStorage.getItem(`ppt_master_data_${selectedIndustry}`);
    if(savedRaw) {
        pptData[selectedIndustry] = JSON.parse(savedRaw);
    } else {
        pptData[selectedIndustry] = {};
        for(let i=1; i<=9; i++) pptData[selectedIndustry][i] = { text: "", img: "" };
    }

    const inputs = document.getElementById('steps-inputs');
    inputs.innerHTML = '';
    slideStructure.forEach((s, index) => {
        const slideD = pptData[selectedIndustry][s.id] || {text:"", img:""};
        const customQuestion = industries[name].questions[index]; 
        const commonPhrase = industries[name].phrases[index];
        
        // 在步驟三加入參考條例按鈕
        let extraBtn = "";
        if (s.id === 3) {
            extraBtn = `<button onclick="showLaws()" class="btn-ref-small" title="查閱相關條例及守則">📄 參考法例與守則</button>`;
        }
        
        inputs.innerHTML += `
            <div class="exercise-step" id="step-box-${s.id}">
                <div style="display:flex; align-items:center; justify-content: space-between; margin-bottom: 15px;">
                    <h4 style="margin:0; color:var(--primary); font-size: 19px;">${s.title}</h4>
                    ${extraBtn}
                </div>
                <p class="hint-text" style="font-size:15px; color:#c0392b; font-weight:bold; margin-bottom:12px; background:#fdf2e9; padding:12px; border-radius:6px; border:1px dashed #e67e22; line-height: 1.6;">
                    🤔 多角度思考：<br><span style="color:#e67e22; font-weight:normal;">${customQuestion}</span>
                </p>
                <div class="phrase-box no-print">
                    <span style="flex:1; margin-right:15px;"><strong>🗣️ 常用句式：</strong><br>${commonPhrase}</span>
                    <button onclick="speakMandarin('${commonPhrase}')" class="btn-tts-small" title="播放普通話語音">🔊 普通話發音</button>
                </div>
                <textarea id="input-s${s.id}" onfocus="jumpToSlide(${s.id})" oninput="syncText(${s.id})" placeholder="👉 提示：請以【點列式】(Bullet points) 呈現資料，保持簡報清晰易讀。&#10;• 重點一...&#10;• 重點二...">${slideD.text}</textarea>
                
                <div class="upload-section no-print">
                    <label class="img-upload-label">
                        🖼️ 上載簡報圖片 (可選)
                        <input type="file" accept="image/*" style="display:none;" onchange="handleImageUpload(event, ${s.id})">
                    </label>
                    <button class="remove-img-btn" id="remove-img-btn-${s.id}" onclick="removeImage(${s.id})" style="display: ${slideD.img ? 'inline-block' : 'none'};">🗑️ 移除圖片</button>
                </div>
            </div>
        `;
    });
    
    switchView('exercise-view');
    currentSlide = 1;
    updateUI();
}

function handleImageUpload(event, id) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(e) {
        pptData[selectedIndustry][id].img = e.target.result;
        document.getElementById(`remove-img-btn-${id}`).style.display = 'inline-block';
        if (currentSlide === id) updateUI();
    };
    reader.readAsDataURL(file);
}

function removeImage(id) {
    pptData[selectedIndustry][id].img = "";
    document.getElementById(`remove-img-btn-${id}`).style.display = 'none';
    if (currentSlide === id) updateUI();
}

function syncText(id) {
    pptData[selectedIndustry][id].text = document.getElementById(`input-s${id}`).value;
    if(id === currentSlide) {
        document.getElementById('ppt-content').innerText = pptData[selectedIndustry][id].text;
    }
}

function updateUI() {
    const color = document.getElementById('theme-color').value;
    const style = document.getElementById('theme-style').value;
    document.documentElement.style.setProperty('--ppt-theme', color);
    
    const preview = document.getElementById('ppt-preview');
    preview.className = `slide-container ${style}`;
    
    const step = slideStructure[currentSlide - 1];
    const sData = pptData[selectedIndustry][currentSlide] || {text:"", img:""};
    
    document.getElementById('ppt-title').innerText = step.slide;
    document.getElementById('ppt-content').innerText = sData.text;
    
    const imgEl = document.getElementById('ppt-img-preview');
    if(sData.img) {
        imgEl.src = sData.img;
        imgEl.style.display = 'block';
    } else {
        imgEl.src = "";
        imgEl.style.display = 'none';
    }
    
    document.getElementById('slide-index').innerText = `${currentSlide} / 9`;
    
    // 更新右側的「多角度思考」提示
    const hintBox = document.getElementById('hint-text');
    if (hintBox && industries[selectedIndustry] && industries[selectedIndustry].questions[currentSlide - 1]) {
        hintBox.innerHTML = industries[selectedIndustry].questions[currentSlide - 1];
    }
}

function jumpToSlide(id) {
    currentSlide = id;
    updateUI();
}

function changeSlide(dir) {
    let next = currentSlide + dir;
    if(next >= 1 && next <= 9) {
        currentSlide = next;
        updateUI();
        document.getElementById(`step-box-${next}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function speakCurrentInput() {
    const text = document.getElementById(`input-s${currentSlide}`).value;
    if(text.trim() === "") {
        alert("當前頁面沒有輸入內容可以聆聽哦！");
        return;
    }
    speakMandarin(text);
}

function showLaws() {
    document.getElementById('modal-title').innerText = `📂 ${selectedIndustry} - 相關法例與守則`;
    document.getElementById('modal-body').innerHTML = industries[selectedIndustry].lawHTML;
    document.getElementById('modal-box').style.display = 'flex';
}

function askUnlock() {
    const pw = prompt("請輸入教師解鎖密碼 (IVELC)：");
    if(pw === "IVELC") {
        document.getElementById('modal-title').innerText = `🎓 ${selectedIndustry} - 教師口頭報告示範`;
        const formattedDemo = industries[selectedIndustry].demo.replace(/\n/g, '<br><br>');
        document.getElementById('modal-body').innerHTML = `<div style="white-space: normal;">${formattedDemo}</div>`;
        document.getElementById('modal-box').style.display = 'flex';
    } else if(pw !== null) {
        alert("密碼不正確，請向老師查詢解鎖密碼！");
    }
}

function generateFinal() {
    const gallery = document.getElementById('final-gallery');
    gallery.innerHTML = '';
    const style = document.getElementById('theme-style').value;

    slideStructure.forEach(s => {
        const sData = pptData[selectedIndustry][s.id] || {text:"", img:""};
        let imgHtml = sData.img ? `<img src="${sData.img}" class="slide-uploaded-img" style="display:block;">` : '';
        
        gallery.innerHTML += `
            <div class="slide-container ${style}" style="box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 8px;">
                <div class="slide-title">${s.slide}</div>
                <div class="slide-body-wrapper">
                    <div class="slide-content">${sData.text || ""}</div>
                    ${imgHtml}
                </div>
            </div>
        `;
    });
    saveLocal(false);
    switchView('final-view');
}

function saveLocal(showAlert = true) {
    localStorage.setItem(`ppt_master_data_${selectedIndustry}`, JSON.stringify(pptData[selectedIndustry]));
    if(showAlert) alert(`已成功保留 ${selectedIndustry} 的進度與圖片！`);
}

// 啟動初始化
init();
</script>
</body>
</html>
